version: 2.1

orbs:
  aws-cli: circleci/aws-cli@3.1

commands:
  install-rust:
    steps:
      - run:
          name: Install Rust stable toolchain
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            echo 'source $HOME/.cargo/env' >> $BASH_ENV
            source $HOME/.cargo/env
            rustc --version
            cargo --version

jobs:
  check-version-bump:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Check version bumped vs main
          command: |
            git fetch origin main --depth 1
            # Skip check if only non-source files changed (CI, docs, config, Makefile)
            CHANGED=$(git diff --name-only origin/main...HEAD)
            SOURCE_CHANGED=$(echo "$CHANGED" | grep -vE '^(\.circleci/|docs/|\.gitignore|Makefile|.*\.md)' || true)
            if [ -z "$SOURCE_CHANGED" ]; then
              echo "Only non-source files changed — skipping version bump requirement"
              echo "Changed files:"
              echo "$CHANGED"
              exit 0
            fi
            CURRENT_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            MAIN_VERSION=$(git show origin/main:pyproject.toml | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
            if [ "$CURRENT_VERSION" = "$MAIN_VERSION" ]; then
              echo "ERROR: pyproject.toml version must be bumped (currently $CURRENT_VERSION, same as main)"
              exit 1
            fi
            echo "Version bumped: $MAIN_VERSION -> $CURRENT_VERSION"
            if ! grep -qF "## [$CURRENT_VERSION]" CHANGELOG.md; then
              echo "ERROR: CHANGELOG.md must contain an entry for ## [$CURRENT_VERSION]"
              exit 1
            fi
            echo "CHANGELOG.md entry found for $CURRENT_VERSION"

  lint:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install uv and dev dependencies
          command: pip install uv && uv sync --extra dev
      - run:
          name: Ruff lint
          command: uv run ruff check pkboost/ pkboost_sklearn/ tests/
      - run:
          name: Ruff format check
          command: uv run ruff format --check --diff pkboost/ pkboost_sklearn/ tests/

  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - install-rust
      - run:
          name: Install uv and dev dependencies
          command: pip install uv && uv sync --extra dev
      - run:
          name: Build extension
          command: uv run maturin develop --release
      - run:
          name: Run tests
          command: |
            uv run pytest tests/ \
              -v \
              --cov=pkboost_sklearn \
              --cov-report=term-missing \
              --cov-report=html \
              --tb=short
      - store_artifacts:
          path: htmlcov

  build-wheel-linux:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - install-rust
      - run:
          name: Install uv and maturin
          command: pip install uv && uv sync --extra dev && uv pip install "maturin[zig]"
      - run:
          name: Build release wheel (manylinux2014 x86_64)
          command: |
            mkdir -p dist/linux
            uv run maturin build --release --manylinux 2014 --zig --out dist/linux/
      - run:
          name: List built artifacts
          command: ls -lh dist/linux/
      - persist_to_workspace:
          root: .
          paths:
            - dist/linux/

  build-wheel-macos-arm64:
    macos:
      xcode: "16.3.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - install-rust
      - run:
          name: Install Python 3.11/3.12/3.13 and maturin
          command: |
            pip3 install uv
            uv python install 3.11 3.12 3.13
            pip3 install maturin
      - run:
          name: Build release wheels (native macOS arm64, Python 3.11/3.12/3.13)
          command: |
            mkdir -p dist/macos-arm64
            maturin build --release \
              -i "$(uv python find 3.11)" \
              -i "$(uv python find 3.12)" \
              -i "$(uv python find 3.13)" \
              --out dist/macos-arm64/
      - run:
          name: List built artifacts
          command: ls -lh dist/macos-arm64/
      - persist_to_workspace:
          root: .
          paths:
            - dist/macos-arm64/

  publish-to-codeartifact:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - aws-cli/setup
      - run:
          name: Configure AWS region
          command: aws configure set default.region $AWS_REGION
      - run:
          name: Install twine
          command: pip install uv && uv pip install --system twine
      - run:
          name: Publish all wheels to CodeArtifact
          command: |
            export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

            export CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
              --domain svp-investment-ops \
              --domain-owner $AWS_ACCOUNT_ID \
              --region $AWS_REGION \
              --query authorizationToken \
              --output text)

            export CODEARTIFACT_REPO_URL=$(aws codeartifact get-repository-endpoint \
              --domain svp-investment-ops \
              --domain-owner $AWS_ACCOUNT_ID \
              --repository python-packages \
              --format pypi \
              --region $AWS_REGION \
              --query repositoryEndpoint \
              --output text)

            echo "Publishing to: $CODEARTIFACT_REPO_URL"

            export TWINE_USERNAME=aws
            export TWINE_PASSWORD=$CODEARTIFACT_AUTH_TOKEN
            export TWINE_REPOSITORY_URL=$CODEARTIFACT_REPO_URL

            WHEELS=$(find dist -name "*.whl" | tr '\n' ' ')
            echo "Wheels to publish: $WHEELS"

            set +e
            python -m twine upload --verbose $WHEELS 2>&1 | tee /tmp/twine_output.log
            upload_exit_code=${PIPESTATUS[0]}
            set -e

            if [ $upload_exit_code -ne 0 ]; then
              if grep -q "409 Conflict\|already exists" /tmp/twine_output.log; then
                echo "Package version already exists in CodeArtifact — skipping"
              else
                cat /tmp/twine_output.log
                exit 1
              fi
            fi

            echo "Done."

  secrets-scan:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install Trivy
          command: |
            mkdir -p $HOME/bin
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $HOME/bin
            echo 'export PATH=$HOME/bin:$PATH' >> $BASH_ENV
      - run:
          name: Scan for secrets
          command: trivy fs --scanners secret --exit-code 1 .

workflows:
  pr-checks:
    jobs:
      - check-version-bump:
          filters:
            branches:
              ignore: main
      - lint:
          filters:
            branches:
              ignore: main
      - test:
          filters:
            branches:
              ignore: main

  release:
    jobs:
      - build-wheel-linux:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+-svp\.\d+$/
            branches:
              ignore: /.*/
      - build-wheel-macos-arm64:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+-svp\.\d+$/
            branches:
              ignore: /.*/
      - publish-to-codeartifact:
          requires:
            - build-wheel-linux
            - build-wheel-macos-arm64
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+-svp\.\d+$/
            branches:
              ignore: /.*/

  security-checks:
    jobs:
      - secrets-scan
